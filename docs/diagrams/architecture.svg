<svg xmlns="http://www.w3.org/2000/svg" width="900" height="448" viewBox="0 0 900 448"
  font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
  role="img" aria-label="Stellar Explorer system architecture diagram">
  <title>Stellar Explorer — System Architecture</title>

  <defs>
    <filter id="card-shadow" x="-8%" y="-8%" width="116%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.07"/>
    </filter>

    <!-- Arrowhead markers (userSpaceOnUse for pixel-exact sizing) -->
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0,10 3.5,0 7" fill="#3B82F6"/>
    </marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0,10 3.5,0 7" fill="#8B5CF6"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0,10 3.5,0 7" fill="#16A34A"/>
    </marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0,10 3.5,0 7" fill="#F97316"/>
    </marker>
    <marker id="arr-sky" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0,10 3.5,0 7" fill="#0EA5E9"/>
    </marker>
  </defs>

  <!-- ── Background ── -->
  <rect width="900" height="448" fill="#F8FAFC" rx="14"/>

  <!-- ── Title ── -->
  <text x="450" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#0F172A" letter-spacing="-0.3">
    Stellar Explorer — System Architecture
  </text>

  <!-- ── Column dividers ── -->
  <line x1="300" y1="48" x2="300" y2="386" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="600" y1="48" x2="600" y2="386" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ── Column headers ── -->
  <text x="150" y="56" text-anchor="middle" font-size="9" font-weight="700" fill="#94A3B8" letter-spacing="1.5">DATA SOURCES</text>
  <text x="450" y="56" text-anchor="middle" font-size="9" font-weight="700" fill="#94A3B8" letter-spacing="1.5">APPLICATION LAYER</text>
  <text x="750" y="56" text-anchor="middle" font-size="9" font-weight="700" fill="#94A3B8" letter-spacing="1.5">CLIENTS</text>


  <!-- ════════════════════════════════════════
       COLUMN 1 — DATA SOURCES
       ════════════════════════════════════════ -->

  <!-- Stellar Network card -->
  <rect x="20" y="68" width="260" height="110" rx="10" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5" filter="url(#card-shadow)"/>
  <text x="150" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#1D4ED8">Stellar Network</text>
  <line x1="32" y1="101" x2="268" y2="101" stroke="#DBEAFE" stroke-width="1"/>
  <text x="150" y="119" text-anchor="middle" font-size="11.5" fill="#475569">Horizon API</text>
  <text x="150" y="138" text-anchor="middle" font-size="11.5" fill="#475569">Soroban RPC</text>
  <text x="150" y="158" text-anchor="middle" font-size="10.5" fill="#93C5FD">public · testnet · futurenet</text>

  <!-- AWS S3 card -->
  <rect x="20" y="198" width="260" height="80" rx="10" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1.5" filter="url(#card-shadow)"/>
  <text x="150" y="222" text-anchor="middle" font-size="13" font-weight="700" fill="#C2410C">AWS S3 Data Lake</text>
  <line x1="32" y1="231" x2="268" y2="231" stroke="#FED7AA" stroke-width="1"/>
  <text x="150" y="250" text-anchor="middle" font-size="11.5" fill="#475569">Public history — 60M+ ledgers</text>
  <text x="150" y="268" text-anchor="middle" font-size="10.5" fill="#FB923C">no credentials required</text>


  <!-- ════════════════════════════════════════
       COLUMN 2 — APPLICATION LAYER
       ════════════════════════════════════════ -->

  <!-- Explorer Web card -->
  <rect x="320" y="68" width="260" height="118" rx="10" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1.5" filter="url(#card-shadow)"/>
  <text x="450" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#5B21B6">Explorer Web</text>
  <line x1="332" y1="101" x2="568" y2="101" stroke="#EDE9FE" stroke-width="1"/>
  <text x="450" y="120" text-anchor="middle" font-size="11.5" fill="#475569">Next.js 16 · React 19 · App Router</text>
  <text x="450" y="139" text-anchor="middle" font-size="11.5" fill="#475569">TanStack Query · Stellar SDK</text>
  <text x="450" y="158" text-anchor="middle" font-size="11.5" fill="#475569">Tailwind CSS 4 · shadcn/ui</text>
  <text x="450" y="177" text-anchor="middle" font-size="10.5" fill="#A78BFA">9 languages · dark / light mode</text>

  <!-- Custom Indexer card -->
  <rect x="320" y="206" width="260" height="166" rx="10" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.5" filter="url(#card-shadow)"/>
  <text x="450" y="230" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">Custom Indexer</text>
  <line x1="332" y1="239" x2="568" y2="239" stroke="#BBF7D0" stroke-width="1"/>
  <text x="450" y="258" text-anchor="middle" font-size="11.5" fill="#475569">Go service · three ingestion modes</text>

  <!-- Mode badges -->
  <rect x="335" y="266" width="40" height="18" rx="9" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <text x="355" y="279" text-anchor="middle" font-size="9.5" font-weight="600" fill="#166534">live</text>

  <rect x="383" y="266" width="54" height="18" rx="9" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <text x="410" y="279" text-anchor="middle" font-size="9.5" font-weight="600" fill="#166534">backfill</text>

  <rect x="445" y="266" width="70" height="18" rx="9" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <text x="480" y="279" text-anchor="middle" font-size="9.5" font-weight="600" fill="#166534">s3backfill</text>

  <line x1="332" y1="295" x2="568" y2="295" stroke="#BBF7D0" stroke-width="1"/>
  <text x="450" y="314" text-anchor="middle" font-size="11.5" fill="#475569">PostgreSQL + TimescaleDB</text>
  <text x="450" y="333" text-anchor="middle" font-size="11.5" fill="#475569">Redis pub/sub · Typesense</text>
  <text x="450" y="352" text-anchor="middle" font-size="10.5" fill="#4ADE80">real-time events · full-text search</text>
  <text x="450" y="365" text-anchor="middle" font-size="10" fill="#86EFAC" font-style="italic">in active development</text>


  <!-- ════════════════════════════════════════
       COLUMN 3 — CLIENTS
       ════════════════════════════════════════ -->

  <!-- Web Browser card -->
  <rect x="620" y="68" width="260" height="110" rx="10" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5" filter="url(#card-shadow)"/>
  <text x="750" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">Web Browser</text>
  <line x1="632" y1="101" x2="868" y2="101" stroke="#E2E8F0" stroke-width="1"/>
  <text x="750" y="120" text-anchor="middle" font-size="11.5" fill="#475569">Explorer UI</text>
  <text x="750" y="139" text-anchor="middle" font-size="11.5" fill="#475569">9 languages · Dark / Light theme</text>
  <text x="750" y="158" text-anchor="middle" font-size="10.5" fill="#94A3B8">public · testnet · futurenet</text>

  <!-- TUI Terminal card -->
  <rect x="620" y="198" width="260" height="152" rx="10" fill="#F0F9FF" stroke="#BAE6FD" stroke-width="1.5" filter="url(#card-shadow)"/>
  <text x="750" y="222" text-anchor="middle" font-size="13" font-weight="700" fill="#0C4A6E">TUI Terminal</text>
  <line x1="632" y1="231" x2="868" y2="231" stroke="#BAE6FD" stroke-width="1"/>
  <text x="750" y="250" text-anchor="middle" font-size="11.5" fill="#475569">Go · keyboard-driven interface</text>
  <text x="750" y="269" text-anchor="middle" font-size="11.5" fill="#475569">bookmarks · notes · labels</text>
  <text x="750" y="288" text-anchor="middle" font-size="11.5" fill="#475569">live monitoring · SQLite local cache</text>
  <text x="750" y="307" text-anchor="middle" font-size="11.5" fill="#475569">Soroban contract decode</text>
  <text x="750" y="338" text-anchor="middle" font-size="10.5" fill="#7DD3FC">RPC · hybrid · indexed modes</text>


  <!-- ════════════════════════════════════════
       ARROWS
       ════════════════════════════════════════ -->

  <!-- 1. Stellar Network → Explorer Web  (solid blue, HTTP) -->
  <line x1="280" y1="113" x2="320" y2="113" stroke="#3B82F6" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="300" y="107" text-anchor="middle" font-size="9" fill="#3B82F6">HTTP / WS</text>

  <!-- 2. Explorer Web → Web Browser  (solid purple) -->
  <line x1="580" y1="121" x2="620" y2="121" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arr-purple)"/>
  <text x="600" y="115" text-anchor="middle" font-size="9" fill="#8B5CF6">serves</text>

  <!-- 3. Stellar Network → Indexer  (dashed green, live / backfill) -->
  <!-- Down from Stellar Network bottom, across gap row, down into Indexer top -->
  <path d="M 150 178 L 150 194 L 450 194 L 450 206"
    stroke="#16A34A" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arr-green)"/>
  <text x="310" y="191" text-anchor="middle" font-size="9" fill="#16A34A">live / backfill</text>

  <!-- 4. AWS S3 → Indexer  (dashed orange, s3backfill) -->
  <path d="M 280 240 L 308 240 L 308 262 L 320 262"
    stroke="#F97316" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arr-orange)"/>
  <text x="310" y="234" text-anchor="middle" font-size="9" fill="#F97316">s3backfill</text>

  <!-- 5. Indexer → TUI Terminal  (dashed sky, hybrid reads) -->
  <line x1="580" y1="270" x2="620" y2="262" stroke="#0EA5E9" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-sky)"/>
  <text x="600" y="258" text-anchor="middle" font-size="9" fill="#0EA5E9">reads</text>


  <!-- ── Footer ── -->
  <line x1="20" y1="388" x2="880" y2="388" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Legend -->
  <line x1="20" y1="406" x2="46" y2="406" stroke="#3B82F6" stroke-width="2"/>
  <text x="54" y="410" font-size="10" fill="#64748B">Live data flow</text>

  <line x1="150" y1="406" x2="176" y2="406" stroke="#64748B" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="184" y="410" font-size="10" fill="#64748B">Indexer pipeline (in development)</text>

  <!-- Right note -->
  <text x="880" y="435" text-anchor="end" font-size="10" fill="#CBD5E1" font-style="italic">stellar-explorer</text>
</svg>
